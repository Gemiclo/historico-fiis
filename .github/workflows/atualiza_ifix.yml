name: Atualizar IFIX Diário

on:
  schedule:
    # Roda de segunda a sexta às 21:30 UTC (18:30 Horário de Brasília)
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # Permite rodar manualmente clicando no botão no GitHub
  
permissions:
  contents: write

jobs:
  scraping_ifix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pytz

      - name: Rodar Script do IFIX
        run: python scraper_ifix.py

      - name: Commit e Push do ifix_atual.json
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add ifix_atual.json
          # Só faz o commit se houver alguma mudança no arquivo
          git diff --quiet && git diff --staged --quiet || (git commit -m "bot: atualização diária do IFIX" && git push)
